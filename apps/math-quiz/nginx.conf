server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    # Allow fetch/connect to OpenAI API while keeping a strict default policy.
    # script-src: 'self' for Vite bundles; hash covers the Vite module-preload inline
    # bootstrap; cloudflareinsights.com allowed because Cloudflare tunnel/proxy
    # injects its beacon script into the HTML response.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-68yIfzxjxERaM667U0Vwb7OyPD6Muj/x4JzGFNVVnGg=' https://static.cloudflareinsights.com; connect-src 'self' https://api.openai.com https://cloudflareinsights.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline';" always;
}
